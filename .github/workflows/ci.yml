name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-workflows:
    name: Validate n8n workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate workflow JSON files
        run: python3 .github/scripts/validate_workflows.py

  lint-web:
    name: Lint chat interface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check JavaScript syntax of every module
        run: |
          find chatbot-ui/js -name "*.js" -print0 | xargs -0 -n1 node --check

  secret-scan:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
